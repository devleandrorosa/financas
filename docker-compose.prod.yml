services:
  nginx:
    image: nginx:1.27-alpine
    container_name: financas_nginx
    volumes:
      - ./frontend/dist:/var/www/frontend/dist:ro
      - ./backend:/var/www/backend:ro
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.financas.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.financas.tls=true"
      - "traefik.http.routers.financas.tls.certresolver=letsencrypt"
      - "traefik.http.services.financas.loadbalancer.server.port=80"
    networks:
      - financas
      - infra

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: financas_app
    volumes:
      - ./backend:/var/www/backend
    env_file: ./backend/.env
    restart: always
    networks:
      - financas
      - infra

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: financas_worker
    volumes:
      - ./backend:/var/www/backend
    env_file: ./backend/.env
    command: php artisan queue:work --sleep=3 --tries=4 --max-time=3600
    restart: always
    networks:
      - financas
      - infra

networks:
  financas:
    driver: bridge
  infra:
    external: true
