services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/var/www/frontend/dist:ro
      - ./backend:/var/www/backend:ro
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: always
    networks:
      - financas

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    volumes:
      - ./backend:/var/www/backend
    env_file: ./backend/.env
    depends_on:
      - postgres
    restart: always
    networks:
      - financas

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    volumes:
      - ./backend:/var/www/backend
    env_file: ./backend/.env
    command: php artisan queue:work --sleep=3 --tries=4 --max-time=3600
    depends_on:
      - postgres
    restart: always
    networks:
      - financas

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: financas
      POSTGRES_USER: financas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no .env da raiz}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    networks:
      - financas

volumes:
  pgdata:

networks:
  financas:
    driver: bridge
