services:
  traefik:
    image: traefik:v3.0
    container_name: financas_traefik
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/traefik/dev.yml:/etc/traefik/traefik.yml:ro
    networks:
      - financas

  nginx:
    image: nginx:1.27-alpine
    container_name: financas_nginx
    volumes:
      - ./backend:/var/www/backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.financas.rule=Host(`${APP_DOMAIN:-financas.localhost}`)"
      - "traefik.http.services.financas.loadbalancer.server.port=80"
    networks:
      - financas

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: financas_app
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      - postgres
      - redis
    networks:
      - financas

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: financas_worker
    volumes:
      - ./backend:/var/www/backend
    command: php artisan queue:work --sleep=3 --tries=3
    depends_on:
      - postgres
      - redis
    networks:
      - financas

  node:
    image: node:20-alpine
    container_name: financas_node
    working_dir: /var/www/frontend
    volumes:
      - ./frontend:/var/www/frontend
    ports:
      - "5174:5174"
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - financas

  postgres:
    image: postgres:16-alpine
    container_name: financas_postgres
    environment:
      POSTGRES_DB: financas
      POSTGRES_USER: financas
      POSTGRES_PASSWORD: financas
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - financas

  redis:
    image: redis:7-alpine
    container_name: financas_redis
    ports:
      - "6380:6379"
    networks:
      - financas

  mailpit:
    image: axllent/mailpit:latest
    container_name: financas_mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - financas

volumes:
  pgdata:

networks:
  financas:
    driver: bridge
